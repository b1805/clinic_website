<!DOCTYPE html>
<html>
<head>
    <title>Bird Trait Finder</title>
</head>
<body>
    <h1>Bird Trait Finder</h1>
    <form action="/generate" method="POST">
        <label for="species">Enter species name or category:</label><br>
        <input type="text" id="species" name="species" required><br><br>

        <label for="traits">Select traits:</label><br>
        <select id="traits" name="traits" multiple size="10">
            {% for trait in traits %}
                <option value="{{ trait }}">{{ trait }}</option>
            {% endfor %}
        </select><br><br>

        <button type="submit">Generate Excel</button>
    </form>
</body>
</html>
